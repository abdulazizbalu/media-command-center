<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Media Command Center</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Media Command Center</p>
        <h1>Plan content like a campaign, not a random posting habit.</h1>
        <p class="subcopy">A compact strategist dashboard for ranking ideas, choosing channels, and building a weekly execution plan.</p>
      </section>
      <section class="stats" id="stats"></section>
      <section class="board">
        <div>
          <h2>Priority Queue</h2>
          <div id="ideas" class="list"></div>
        </div>
        <div>
          <h2>This Week</h2>
          <div id="plan" class="timeline"></div>
        </div>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
